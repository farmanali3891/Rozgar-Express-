<!DOCTYPE html>
<html>
<head>
  <title>Rozgar Express</title>
  <style>
    body { font-family: Arial; background:#f2f4f8; margin:0; }
    .container { max-width:800px; margin:auto; padding:20px; }

    .card {
      background:white;
      padding:18px;
      margin:15px 0;
      border-radius:12px;
      box-shadow:0 3px 10px rgba(0,0,0,0.08);
    }

    .title { font-size:18px; font-weight:bold; }
    .company { color:#555; margin:5px 0; }
    .country { color:#888; font-size:13px; }

    button {
      background:#0b5ed7;
      color:white;
      border:none;
      padding:8px 14px;
      border-radius:6px;
      cursor:pointer;
    }
  </style>
</head>

<body>
<div class="container">
  <h1 style="text-align:center;">Rozgar Express 🚀</h1>

  <div class="card">
    <div class="title">Procurement Manager</div>
    <div class="company">TRDP</div>
    <div class="country">Pakistan</div>
    <button onclick="window.open('https://www.rozee.pk/job-search?keywords=procurement%20manager')">
      View & Apply
    </button>
  </div>

  <div class="card">
    <div class="title">Warehouse Supervisor</div>
    <div class="company">Al Futtaim Group</div>
    <div class="country">Dubai</div>
    <button onclick="window.open('https://www.linkedin.com/jobs/search/?keywords=warehouse%20supervisor%20dubai')">
      View & Apply
    </button>
  </div>

  <div class="card">
    <div class="title">Driver</div>
    <div class="company">Saudi Logistics</div>
    <div class="country">Saudi Arabia</div>
    <button onclick="window.open('https://www.bayt.com/en/saudi-arabia/jobs/search/?q=driver')">
      View & Apply
    </button>
  </div>

</div>
</body>
</html>
