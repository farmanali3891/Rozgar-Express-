<!DOCTYPE html>
<html>
<head>
  <title>Rozgar Express</title>
  <style>
    body { font-family: Arial; background:#f2f4f8; margin:0; }
    .container { max-width:800px; margin:auto; padding:20px; }
    h1 { text-align:center; }

    .card {
      background:white;
      padding:18px;
      margin:15px 0;
      border-radius:12px;
      box-shadow:0 3px 10px rgba(0,0,0,0.08);
    }

    .title { font-size:18px; font-weight:bold; }
    .company { color:#555; margin:5px 0; }
    .country { color:#888; font-size:13px; }

    button {
      background:#0b5ed7;
      color:white;
      border:none;
      padding:8px 14px;
      border-radius:6px;
      cursor:pointer;
      margin-top:10px;
    }
  </style>
</head>

<body>
<div class="container">
  <h1>Rozgar Express 🚀</h1>
  <div id="jobs">Loading jobs...</div>
</div>

<script>
async function loadJobs() {
  const url = "https://jsearch.p.rapidapi.com/search?query=jobs%20in%20Pakistan%20Dubai%20Saudi&num_pages=1";

  const options = {
    method: "GET",
    headers: {
      "X-RapidAPI-Key": "YOUR_API_KEY_HERE",
      "X-RapidAPI-Host": "jsearch.p.rapidapi.com"
    }
  };

  try {
    const res = await fetch(url, options);
    const data = await res.json();

    document.getElementById("jobs").innerHTML =
      data.data.map(job => `
        <div class="card">
          <div class="title">${job.job_title}</div>
          <div class="company">${job.employer_name || "Company N/A"}</div>
          <div class="country">${job.job_country || "Global"}</div>

          <button onclick="window.open('${job.job_apply_link}')">
            View & Apply
          </button>
        </div>
      `).join('');

  } catch (err) {
    document.getElementById("jobs").innerHTML = "Failed to load jobs.";
  }
}

loadJobs();
</script>

</body>
</html>
