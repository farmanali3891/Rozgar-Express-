<!DOCTYPE html>
<html>
<head>
  <title>Rozgar Express</title>
  <style>
    body { font-family: Arial; margin:0; background:#f4f4f4; }
    .container { max-width:700px; margin:auto; padding:20px; }
    .card { background:white; padding:15px; margin:10px 0; border-radius:10px; }
    button { padding:10px; margin:5px; cursor:pointer; }
    h1 { text-align:center; }
  </style>
</head>
<body>

<div class="container">
  <h1>Rozgar Express 🚀</h1>

  <p>🔎 Auto Job Feeds (Latest Jobs)</p>

  <div class="card">
    <h3>🇵🇰 Pakistan Jobs</h3>
    <button onclick="openLink('https://pk.indeed.com/jobs?q=jobs')">Indeed Pakistan</button>
    <button onclick="openLink('https://www.linkedin.com/jobs/search/?keywords=jobs%20pakistan')">LinkedIn Pakistan</button>
  </div>

  <div class="card">
    <h3>🇦🇪 Dubai Jobs</h3>
    <button onclick="openLink('https://www.linkedin.com/jobs/search/?keywords=jobs%20dubai')">LinkedIn Dubai</button>
    <button onclick="openLink('https://www.bayt.com/en/uae/jobs/')">Bayt UAE</button>
  </div>

  <div class="card">
    <h3>🇸🇦 Saudi Jobs</h3>
    <button onclick="openLink('https://www.linkedin.com/jobs/search/?keywords=jobs%20saudi%20arabia')">LinkedIn Saudi</button>
    <button onclick="openLink('https://www.bayt.com/en/saudi-arabia/jobs/')">Bayt Saudi</button>
  </div>

</div>

<script>
function openLink(url){
  window.open(url, "_blank");
}
</script>

</body>
</html>
